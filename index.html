<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeWave</title>
    <script src="https://kit.fontawesome.com/932ffadf22.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="final.css">
    <script src="final.js" defer></script>
</head>
<body>
    <div class="landing__banner--background-wrapper">
        <div class="landing__banner--background">
            <div class="header">
                <div class="row">
                    <div class="nav">
                        <h2 class="section__title">
                            AnimeWave
                        </h2>
                        <ul class="nav__link--list">
                            <li class="nav__link">
                                <a href="#" onclick="focusSearch()">Search</a>
                            </li>
                            <li class="nav__link">
                                <a href="#shows">Top Rated</a>
                            </li>
                            <li class="nav__link">
                                <a href="" class="nav__link--contact">Contact</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <main>
                <section id="landing">
                    <div class="container">
                        <div class="row">
                            <div class="landing__content">
                                <div class="search__input">
                                    <input type="text" placeholder="Find Your Anime" class="search__input--field">
                                    <button class="input__button">
                                        <svg data-v-2a11e7ca aria-hidden="true" focusable="false" data-prefix="fas" data-icon="search" role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="svg-inline--fa fa-search fa-w-16">
                                            <path data-v-2a11e7ca fill="currentColor" d="M505 442.7L405.3 343c-4.5-4.5-10.6-7-17-7H372c27.6-35.3 44-79.7 44-128C416 93.1 322.9 0 208 0S0 93.1 0 208s93.1 208 208 208c48.3 0 92.7-16.4 128-44v16.3c0 6.4 2.5 12.5 7 17l99.7 99.7c9.4 9.4 24.6 9.4 33.9 0l28.3-28.3c9.4-9.4 9.4-24.6.1-34zM208 336c-70.7 0-128-57.2-128-128 0-70.7 57.2-128 128-128 70.7 0 128 57.2 128 128 0 70.7-57.2 128-128 128z" class></path>
                                        </svg>
                                    </button>
                                </div>
                                <div class="landing__header">
                                    <h3>Popular Right Now</h3>
                                </div>
                                <div class="line"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <section id="shows">
                    <div class="container">
                        <div class="row">
                            <div class="shows__content">
                                <i class="fa-solid fa-spinner shows__loading--spinner"></i>
                                <div class="shows__grid"></div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>
</html>
